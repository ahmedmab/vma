<!-- The Modal -->
<div class="modal" id="myModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <!-- Modal Header -->
      <div class="modal-header">
        <h2 class="modal-title" style="width: 50%; margin-left: 30%;">Contactez nous</h2>
        <button style="font-weight: 800;" type="button" class="close" data-dismiss="modal">&times;</button>
      </div>

      <!-- Modal body -->
      <div class="modal-body">
        <form style="width: 80%; margin: 0 auto;" enctype="text/plain" [formGroup]="msgForm">
          <!-- Name input -->
          <div class="form-outline mb-2">
            <input type="text" id="form4Example1" class="form-control" formControlName="name"/>
            <label class="form-label" for="form4Example1">Nom et Prènom</label>
          </div>
        
          <!-- Email input -->
          <div class="form-outline mb-2">
            <input type="email" id="form4Example2" class="form-control" formControlName="email"/>
            <label class="form-label" for="form4Example2">Email</label>
          </div>
        
          <!-- Message input -->
          <div class="form-outline mb-2">
            <textarea class="form-control" id="form4Example3" rows="4" formControlName="msg"></textarea>
            <label class="form-label" for="form4Example3">Message</label>
          </div>
          <!-- Submit button -->
          <button type="submit" class="btn btn-primary btn-block mb-4"(click)="onSubmit(msgForm.value) ; msgForm.reset()">Envoyer</button>
        </form>
     
  </div>
</div>
